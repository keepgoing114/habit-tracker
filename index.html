<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>데일리 루틴</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #1a1a2e; --card: #22223a; --card2: #2a2a45;
    --yellow: #f5a623; --pink: #ff6b9d; --green: #4caf82;
    --blue: #5b8dee; --purple: #9b72cf;
    --text: #f0f0f0; --sub: #888aaa; --border: #33335a;
    --morning: #f5a623; --afternoon: #4caf82; --evening: #9b72cf;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans KR', sans-serif; max-width: 420px; margin: 0 auto; min-height: 100vh; }

  .header { padding: 16px 20px 12px; }
  .title { font-size: 22px; font-weight: 800; }
  .title span:first-child { color: var(--yellow); }
  .title span:last-child { color: var(--pink); }
  .subtitle { font-size: 11px; color: var(--sub); margin-top: 2px; }

  .tabs { display: grid; grid-template-columns: 1fr 1fr; margin: 0 16px; gap: 8px; }
  .tab { padding: 10px 0; font-size: 14px; font-weight: 700; color: var(--sub); cursor: pointer; border-radius: 12px; text-align: center; background: var(--card); border: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: #1a1a2e; background: var(--yellow); border-color: var(--yellow); }

  .content { padding: 12px 16px; padding-bottom: 100px; }

  .date-bar { background: var(--card); border-radius: 12px; padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .date-nav { color: var(--sub); font-size: 16px; cursor: pointer; padding: 4px 6px; }
  .date-center { text-align: center; }
  .date-title { font-size: 15px; font-weight: 700; }
  .date-count { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .today-btn { background: var(--yellow); color: #1a1a2e; border: none; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; }

  .section { background: var(--card); border-radius: 14px; padding: 12px; margin-bottom: 8px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-label { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 700; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.morning { background: var(--morning); }
  .dot.afternoon { background: var(--afternoon); }
  .dot.evening { background: var(--evening); }
  .section-time { font-size: 11px; }
  .section-time.morning { color: var(--morning); }
  .section-time.afternoon { color: var(--afternoon); }
  .section-time.evening { color: var(--evening); }

  /* Habit Row */
  .habit-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); user-select: none; transition: background 0.15s; }
  .habit-row:last-of-type { border-bottom: none; }
  .habit-row.pressing { background: rgba(255,255,255,0.04); border-radius: 8px; }
  .check-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px dashed var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; transition: all 0.2s; }
  .habit-name { flex: 1; font-size: 14px; transition: all 0.2s; }
  .habit-name.done-text { text-decoration: line-through; color: var(--sub); }
  .habit-badge { display: flex; align-items: center; gap: 4px; background: var(--card2); padding: 3px 9px; border-radius: 20px; font-size: 11px; flex-shrink: 0; }
  .habit-badge.todo-badge { background: transparent; border: 1px solid var(--border); }

  /* FAB */
  .fab { position: fixed; bottom: 28px; right: 50%; transform: translateX(50%); max-width: 420px; width: 100%; display: flex; justify-content: flex-end; padding-right: 20px; pointer-events: none; z-index: 100; }
  .fab-btn { pointer-events: all; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #f5a623, #ff6b9d); border: none; color: white; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(245,166,35,0.4); display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
  .fab-btn:active { transform: scale(0.93); }

  /* 오버레이 & 바텀시트 */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .sheet-overlay.show { opacity: 1; pointer-events: all; }
  .bottom-sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 420px; background: var(--card); border-radius: 24px 24px 0 0; z-index: 300; padding: 20px 20px 40px; transition: transform 0.3s cubic-bezier(.32,1,.56,1); }
  .bottom-sheet.show { transform: translateX(-50%) translateY(0); }
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .sheet-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; text-align: center; }

  /* 타입 선택 */
  .type-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 4px; }
  .type-btn { padding: 16px; border-radius: 14px; border: 2px solid var(--border); background: var(--card2); cursor: pointer; text-align: center; transition: all 0.2s; }
  .type-btn.selected { border-color: var(--yellow); background: rgba(245,166,35,0.1); }
  .type-btn .type-icon { font-size: 26px; display: block; margin-bottom: 6px; }
  .type-btn .type-label { font-size: 13px; font-weight: 700; color: var(--text); }
  .type-btn .type-desc { font-size: 11px; color: var(--sub); margin-top: 3px; }

  /* 입력 폼 */
  .form-section { display: none; }
  .form-row { margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--sub); margin-bottom: 5px; }
  .form-input { width: 100%; background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 10px; font-size: 14px; outline: none; }
  .form-input:focus { border-color: var(--yellow); }
  .form-input::placeholder { color: var(--sub); }

  .emoji-grid { display: flex; flex-wrap: wrap; gap: 7px; }
  .emoji-item { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 19px; cursor: pointer; background: var(--card2); border: 2px solid transparent; }
  .emoji-item.selected { border-color: var(--yellow); background: rgba(245,166,35,0.1); }

  .time-row { display: flex; align-items: center; gap: 10px; }
  .time-wrap { flex: 1; position: relative; }
  .time-icon-abs { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; }
  .time-input { width: 100%; background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 9px 12px 9px 32px; border-radius: 10px; font-size: 14px; outline: none; }
  .time-input:focus { border-color: var(--yellow); }
  .time-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; min-width: 44px; text-align: center; background: var(--card2); color: var(--sub); transition: all 0.2s; }
  .time-badge.morning { background: rgba(245,166,35,0.18); color: var(--morning); }
  .time-badge.afternoon { background: rgba(76,175,130,0.18); color: var(--afternoon); }
  .time-badge.evening { background: rgba(155,114,207,0.18); color: var(--evening); }

  .submit-btn { width: 100%; background: linear-gradient(90deg, #f5a623, #ff6b9d); border: none; color: white; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
  .back-btn { background: none; border: none; color: var(--sub); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; margin-bottom: 14px; padding: 0; }

  /* 꾹 누르기 메뉴 */
  .context-menu { position: fixed; z-index: 500; background: var(--card2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.4); min-width: 160px; }
  .context-item { padding: 12px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .context-item:last-of-type { border-bottom: none; }
  .context-item:hover { background: rgba(255,255,255,0.06); }
  .context-item.danger { color: #ff5555; }

  /* 달력 */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 14px; }
  .cal-nav-btn { background: none; border: none; color: var(--sub); font-size: 20px; cursor: pointer; padding: 4px 10px; }
  .cal-month-title { font-size: 16px; font-weight: 700; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 14px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--sub); padding: 3px 0 7px; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; background: var(--card); cursor: pointer; font-size: 13px; gap: 2px; }
  .cal-day.empty { background: transparent; cursor: default; }
  .cal-day.today { background: var(--yellow); color: #1a1a2e; font-weight: 800; }
  .cal-day.selected { outline: 2px solid var(--yellow); }
  .cal-dots { display: flex; gap: 2px; }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; }
  .cal-detail { background: var(--card); border-radius: 14px; padding: 14px; }
  .cal-detail-header { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
  .cal-detail-date { font-size: 14px; font-weight: 700; }
  .cal-today-tag { background: var(--yellow); color: #1a1a2e; font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
  .cal-habit-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .cal-habit-row:last-of-type { border-bottom: none; }
  .cal-check { width: 20px; height: 20px; border-radius: 50%; border: 2px dashed var(--border); flex-shrink: 0; }
  .cal-habit-name { flex: 1; font-size: 13px; }
  .cal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 12px; }
  .cal-stat { background: var(--card2); border-radius: 10px; padding: 10px 6px; text-align: center; }
  .cal-stat-val { font-size: 16px; font-weight: 800; }
  .cal-stat-label { font-size: 10px; color: var(--sub); margin-top: 2px; }

  /* 백업 */
  .backup-section { margin-top: 16px; }
  .backup-label { font-size: 11px; color: var(--sub); margin-bottom: 8px; }
  .backup-btns { display: flex; gap: 10px; }
  .backup-btn { flex: 1; padding: 11px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .backup-btn.save { background: var(--blue); color: white; }
  .backup-btn.restore { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .backup-hint { font-size: 10px; color: var(--sub); text-align: center; margin-top: 7px; }

  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 12px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  #toast.show { opacity: 1; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="title"><span>데일리</span> <span>루틴</span></div>
  <div class="subtitle">습관 + 할일 기록</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">오늘</div>
  <div class="tab" onclick="switchTab('calendar')">달력</div>
</div>

<!-- 오늘 탭 -->
<div class="content" id="tab-today">
  <div class="date-bar">
    <span class="date-nav">‹</span>
    <div class="date-center">
      <div class="date-title" id="todayTitle"></div>
      <div class="date-count" id="todayCount">0/0개 완료</div>
    </div>
    <button class="today-btn">오늘</button>
  </div>
  <div class="section" id="sec-morning">
    <div class="section-header">
      <div class="section-label"><div class="dot morning"></div><span>오전</span></div>
      <span class="section-time morning">05:00 — 12:00</span>
    </div>
  </div>
  <div class="section" id="sec-afternoon">
    <div class="section-header">
      <div class="section-label"><div class="dot afternoon"></div><span>오후</span></div>
      <span class="section-time afternoon">12:00 — 18:00</span>
    </div>
  </div>
  <div class="section" id="sec-evening">
    <div class="section-header">
      <div class="section-label"><div class="dot evening"></div><span>저녁</span></div>
      <span class="section-time evening">18:00 — 24:00</span>
    </div>
  </div>
</div>

<!-- 달력 탭 -->
<div class="content hidden" id="tab-calendar">
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
    <span class="cal-month-title" id="calMonthTitle"></span>
    <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="cal-detail" id="calDetail"></div>
  <div class="backup-section">
    <div class="backup-label">🖥 데이터 백업</div>
    <div class="backup-btns">
      <button class="backup-btn save" onclick="backupSave()">💾 백업 저장</button>
      <button class="backup-btn restore" onclick="backupRestore()">📂 백업 복원</button>
    </div>
    <div class="backup-hint">폰 교체 전 백업 저장 → 새 폰에서 복원</div>
  </div>
</div>

<!-- FAB -->
<div class="fab" id="fabArea">
  <button class="fab-btn" onclick="openSheet()">＋</button>
</div>

<!-- 오버레이 -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

<!-- 바텀시트 -->
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>

  <!-- 타입 선택 -->
  <div id="stepType">
    <div class="sheet-title">무엇을 추가할까요?</div>
    <div class="type-select">
      <div class="type-btn" onclick="selectType('habit')">
        <span class="type-icon">⭐</span>
        <div class="type-label">습관</div>
        <div class="type-desc">매일 반복하는 루틴</div>
      </div>
      <div class="type-btn" onclick="selectType('todo')">
        <span class="type-icon">✅</span>
        <div class="type-label">할일</div>
        <div class="type-desc">오늘 하루만의 할일</div>
      </div>
    </div>
  </div>

  <!-- 습관 입력 -->
  <div id="stepHabit" class="form-section">
    <button class="back-btn" onclick="backToType()">← 뒤로</button>
    <div class="sheet-title" id="habitSheetTitle">습관 추가</div>
    <div class="form-row">
      <div class="form-label">아이콘</div>
      <div class="emoji-grid" id="emojiGrid">
        <div class="emoji-item selected" onclick="selectEmoji(this)">⭐</div>
        <div class="emoji-item" onclick="selectEmoji(this)">🔥</div>
        <div class="emoji-item" onclick="selectEmoji(this)">💎</div>
        <div class="emoji-item" onclick="selectEmoji(this)">🌟</div>
        <div class="emoji-item" onclick="selectEmoji(this)">🍀</div>
        <div class="emoji-item" onclick="selectEmoji(this)">🎯</div>
        <div class="emoji-item" onclick="selectEmoji(this)">📚</div>
        <div class="emoji-item" onclick="selectEmoji(this)">💪</div>
        <div class="emoji-item" onclick="selectEmoji(this)">🏆</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">습관 이름</div>
      <input class="form-input" id="habitName" type="text" placeholder="예: 독서 30분">
    </div>
    <div class="form-row">
      <div class="form-label">시간 입력 → 자동 분류</div>
      <div class="time-row">
        <div class="time-wrap">
          <span class="time-icon-abs">⏰</span>
          <input class="time-input" id="habitTime" type="time" oninput="updateBadge(this.value,'habitBadge')">
        </div>
        <div class="time-badge" id="habitBadge">—</div>
      </div>
    </div>
    <button class="submit-btn" id="habitSubmitBtn" onclick="submitHabit()">추가하기 ✨</button>
  </div>

  <!-- 할일 입력 -->
  <div id="stepTodo" class="form-section">
    <button class="back-btn" onclick="backToType()">← 뒤로</button>
    <div class="sheet-title">할일 추가</div>
    <div class="form-row">
      <div class="form-label">할일 내용</div>
      <input class="form-input" id="todoName" type="text" placeholder="예: 미팅 자료 준비">
    </div>
    <div class="form-row">
      <div class="form-label">시간대 (선택)</div>
      <div class="time-row">
        <div class="time-wrap">
          <span class="time-icon-abs">⏰</span>
          <input class="time-input" id="todoTime" type="time" oninput="updateBadge(this.value,'todoBadge')">
        </div>
        <div class="time-badge" id="todoBadge">—</div>
      </div>
    </div>
    <button class="submit-btn" onclick="submitTodo()">추가하기 ✨</button>
  </div>
</div>

<!-- 꾹 누르기 컨텍스트 메뉴 -->
<div class="context-menu hidden" id="contextMenu">
  <div class="context-item" onclick="contextEdit()">✏️ 이름 수정</div>
  <div class="context-item" onclick="contextMoveUp()">↑ 위로 이동</div>
  <div class="context-item" onclick="contextMoveDown()">↓ 아래로 이동</div>
  <div class="context-item danger" onclick="contextDelete()">🗑 삭제</div>
</div>

<div id="toast"></div>

<script>
  // ── 상태 ──────────────────────────────────
  const STORAGE_KEY = 'dailyRoutine_v2';
  let editingRow = null;   // 꾹 누르기 대상 row
  let editingMode = false; // 수정 중 여부
  let pressTimer = null;

  const defaultHabits = [
    { name: '독서 30p',     icon: '💎', section: 'morning',   type: 'habit' },
    { name: '블로그 글쓰기', icon: '⭐', section: 'morning',   type: 'habit' },
    { name: '영어문장 10개', icon: '🌟', section: 'morning',   type: 'habit' },
    { name: '운동 30분',     icon: '🔥', section: 'afternoon', type: 'habit' },
    { name: '일본어 10분',   icon: '🍀', section: 'evening',   type: 'habit' },
  ];

  // ── 초기화 ────────────────────────────────
  function init() {
    setTodayTitle();
    const saved = loadData();
    renderAllRows(saved);
  }

  function setTodayTitle() {
    const now = new Date();
    const days = ['일','월','화','수','목','금','토'];
    document.getElementById('todayTitle').textContent =
      `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()} (${days[now.getDay()]})`;
  }

  // ── 탭 전환 ───────────────────────────────
  function switchTab(name) {
    ['today','calendar'].forEach(n => document.getElementById('tab-'+n).classList.toggle('hidden', n!==name));
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['today','calendar'][i]===name));
    document.getElementById('fabArea').classList.toggle('hidden', name==='calendar');
    if (name==='calendar') renderCalendar();
  }

  // ── 행 렌더링 ─────────────────────────────
  function renderAllRows(habits) {
    ['morning','afternoon','evening'].forEach(sec => {
      document.querySelectorAll(`#sec-${sec} .habit-row`).forEach(r => r.remove());
    });
    habits.forEach(h => createRow(h.section, h.name, h.icon, h.type));
    updateCount();
  }

  function createRow(sec, name, icon, type) {
    const secEl = document.getElementById('sec-' + sec);
    const row = document.createElement('div');
    row.className = 'habit-row';
    row.dataset.type = type;
    row.dataset.icon = icon;

    const isTodo = type === 'todo';
    const badgeHtml = isTodo
      ? `<div class="habit-badge todo-badge">할일</div>`
      : `<div class="habit-badge">${icon} 습관</div>`;

    row.innerHTML = `
      <div class="check-circle" onclick="toggleCheck(this,'${sec}')"></div>
      <span class="habit-name">${name}</span>
      ${badgeHtml}
    `;

    // 꾹 누르기
    row.addEventListener('touchstart', e => {
      pressTimer = setTimeout(() => openContextMenu(e, row), 500);
    }, { passive: true });
    row.addEventListener('touchend', () => clearTimeout(pressTimer));
    row.addEventListener('touchmove', () => clearTimeout(pressTimer));
    row.addEventListener('mousedown', e => {
      pressTimer = setTimeout(() => openContextMenu(e, row), 500);
    });
    row.addEventListener('mouseup', () => clearTimeout(pressTimer));

    secEl.appendChild(row);
    return row;
  }

  // ── 체크 ──────────────────────────────────
  function toggleCheck(el, period) {
    clearTimeout(pressTimer);
    const colorMap = { morning: '#f5a623', afternoon: '#4caf82', evening: '#9b72cf' };
    const color = colorMap[period];
    const nameEl = el.nextElementSibling;
    const isDone = el.dataset.done === '1';
    if (isDone) {
      el.dataset.done = '0'; el.style.background=''; el.style.borderColor=''; el.style.borderStyle='dashed'; el.textContent=''; nameEl.classList.remove('done-text');
    } else {
      el.dataset.done = '1'; el.style.background=color; el.style.borderColor=color; el.style.borderStyle='solid'; el.textContent='✓'; el.style.color='#1a1a2e'; nameEl.classList.add('done-text');
    }
    updateCount();
  }

  function updateCount() {
    const total = document.querySelectorAll('#tab-today .check-circle').length;
    const done = document.querySelectorAll('#tab-today .check-circle[data-done="1"]').length;
    document.getElementById('todayCount').textContent = `${done}/${total}개 완료`;
  }

  // ── 바텀시트 ──────────────────────────────
  let selectedEmoji = '⭐';

  function openSheet() {
    document.getElementById('overlay').classList.add('show');
    document.getElementById('bottomSheet').classList.add('show');
    editingMode = false;
    editingRow = null;
    showStep('stepType');
  }
  function closeSheet() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('bottomSheet').classList.remove('show');
    editingMode = false;
    editingRow = null;
  }
  function showStep(id) {
    ['stepType','stepHabit','stepTodo'].forEach(s => {
      document.getElementById(s).style.display = s===id ? 'block' : 'none';
    });
  }
  function selectType(type) {
    showStep(type==='habit' ? 'stepHabit' : 'stepTodo');
    setTimeout(() => document.getElementById(type==='habit' ? 'habitName' : 'todoName').focus(), 100);
  }
  function backToType() { showStep('stepType'); }

  function selectEmoji(el) {
    document.querySelectorAll('.emoji-item').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedEmoji = el.textContent;
  }

  function updateBadge(val, id) {
    const b = document.getElementById(id);
    if (!val) { b.textContent='—'; b.className='time-badge'; return; }
    const h = parseInt(val.split(':')[0]);
    if (h>=5&&h<12) { b.textContent='오전'; b.className='time-badge morning'; }
    else if (h>=12&&h<18) { b.textContent='오후'; b.className='time-badge afternoon'; }
    else { b.textContent='저녁'; b.className='time-badge evening'; }
  }

  function getSection(t) {
    if (!t) return 'morning';
    const h = parseInt(t.split(':')[0]);
    if (h>=12&&h<18) return 'afternoon';
    if (h>=18||h<5) return 'evening';
    return 'morning';
  }

  // ── 습관/할일 추가 & 수정 ──────────────────
  function submitHabit() {
    const name = document.getElementById('habitName').value.trim();
    if (!name) return;
    const time = document.getElementById('habitTime').value;
    const sec = getSection(time);

    if (editingMode && editingRow) {
      // 수정
      editingRow.querySelector('.habit-name').textContent = name;
      editingRow.querySelector('.habit-badge').textContent = selectedEmoji + ' 습관';
      editingRow.dataset.icon = selectedEmoji;
      // 섹션 이동 필요 시
      const curSec = editingRow.closest('.section').id.replace('sec-','');
      if (curSec !== sec) {
        editingRow.remove();
        createRow(sec, name, selectedEmoji, 'habit');
      }
      showToast('수정 완료 ✅');
    } else {
      createRow(sec, name, selectedEmoji, 'habit');
      showToast('습관 추가 ✨');
    }

    saveData(); updateCount(); closeSheet();
    document.getElementById('habitName').value='';
    document.getElementById('habitTime').value='';
    document.getElementById('habitBadge').textContent='—';
    document.getElementById('habitBadge').className='time-badge';
  }

  function submitTodo() {
    const name = document.getElementById('todoName').value.trim();
    if (!name) return;
    const time = document.getElementById('todoTime').value;
    const sec = getSection(time);
    createRow(sec, name, '✅', 'todo');
    saveData(); updateCount(); closeSheet();
    document.getElementById('todoName').value='';
    document.getElementById('todoTime').value='';
    document.getElementById('todoBadge').textContent='—';
    document.getElementById('todoBadge').className='time-badge';
    showToast('할일 추가 ✅');
  }

  // ── 꾹 누르기 컨텍스트 메뉴 ────────────────
  function openContextMenu(e, row) {
    editingRow = row;
    const menu = document.getElementById('contextMenu');
    menu.classList.remove('hidden');

    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const y = (e.touches ? e.touches[0].clientY : e.clientY);
    const mw = 170, mh = 180;
    const left = Math.min(x, window.innerWidth - mw - 10);
    const top = Math.min(y, window.innerHeight - mh - 10);
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';

    document.addEventListener('click', closeContextOnOutside, { once: true });
  }

  function closeContextOnOutside(e) {
    const menu = document.getElementById('contextMenu');
    if (!menu.contains(e.target)) menu.classList.add('hidden');
  }

  function contextEdit() {
    document.getElementById('contextMenu').classList.add('hidden');
    if (!editingRow) return;
    const isTodo = editingRow.dataset.type === 'todo';
    if (isTodo) {
      // 할일은 이름만 수정
      const name = editingRow.querySelector('.habit-name').textContent;
      const newName = prompt('할일 이름 수정', name);
      if (newName && newName.trim()) {
        editingRow.querySelector('.habit-name').textContent = newName.trim();
        saveData(); showToast('수정 완료 ✅');
      }
    } else {
      // 습관은 바텀시트 열어서 수정
      editingMode = true;
      const name = editingRow.querySelector('.habit-name').textContent;
      const icon = editingRow.dataset.icon || '⭐';
      document.getElementById('habitName').value = name;
      document.getElementById('habitSheetTitle').textContent = '습관 수정';
      document.getElementById('habitSubmitBtn').textContent = '수정하기 ✅';
      // 이모지 선택
      document.querySelectorAll('.emoji-item').forEach(e => {
        e.classList.toggle('selected', e.textContent === icon);
      });
      selectedEmoji = icon;
      document.getElementById('overlay').classList.add('show');
      document.getElementById('bottomSheet').classList.add('show');
      showStep('stepHabit');
    }
  }

  function contextMoveUp() {
    document.getElementById('contextMenu').classList.add('hidden');
    if (!editingRow) return;
    const prev = editingRow.previousElementSibling;
    if (prev && prev.classList.contains('habit-row')) {
      editingRow.parentNode.insertBefore(editingRow, prev);
      saveData(); showToast('위로 이동 ↑');
    }
  }

  function contextMoveDown() {
    document.getElementById('contextMenu').classList.add('hidden');
    if (!editingRow) return;
    const next = editingRow.nextElementSibling;
    if (next && next.classList.contains('habit-row')) {
      editingRow.parentNode.insertBefore(next, editingRow);
      saveData(); showToast('아래로 이동 ↓');
    }
  }

  function contextDelete() {
    document.getElementById('contextMenu').classList.add('hidden');
    if (!editingRow) return;
    editingRow.style.transition = 'opacity 0.2s';
    editingRow.style.opacity = '0';
    setTimeout(() => { editingRow.remove(); saveData(); updateCount(); showToast('삭제됨 🗑'); }, 200);
  }

  // ── localStorage ──────────────────────────
  function saveData() {
    const rows = document.querySelectorAll('#tab-today .habit-row');
    const data = [];
    rows.forEach(row => {
      const sec = row.closest('.section').id.replace('sec-','');
      data.push({
        name: row.querySelector('.habit-name').textContent,
        icon: row.dataset.icon || '✅',
        section: sec,
        type: row.dataset.type || 'habit'
      });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadData() {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      return s ? JSON.parse(s) : defaultHabits;
    } catch { return defaultHabits; }
  }

  function backupSave() {
    saveData();
    const data = localStorage.getItem(STORAGE_KEY)||'[]';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([data],{type:'application/json'}));
    a.download = `dailyroutine_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showToast('백업 저장 완료 💾');
  }

  function backupRestore() {
    const input = document.createElement('input');
    input.type='file'; input.accept='.json';
    input.onchange = e => {
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          renderAllRows(data);
          showToast('복원 완료 ✅');
        } catch { showToast('파일 오류 ❌'); }
      };
      reader.readAsText(e.target.files[0]);
    };
    input.click();
  }

  // ── 토스트 ────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── 달력 ──────────────────────────────────
  let calYear = new Date().getFullYear(), calMonth = new Date().getMonth()+1, selectedDay = new Date().getDate();
  const dotData = { 15: ['#f5a623','#4caf82','#9b72cf'] };

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth>12){calMonth=1;calYear++;} if(calMonth<1){calMonth=12;calYear--;}
    selectedDay = null; renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calMonthTitle').textContent = `${calYear}년 ${calMonth}월`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    ['일','월','화','수','목','금','토'].forEach(d => {
      const el = document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
    });
    const firstDay = new Date(calYear,calMonth-1,1).getDay();
    const daysInMonth = new Date(calYear,calMonth,0).getDate();
    const today = new Date();
    const isCurMon = today.getFullYear()===calYear && today.getMonth()+1===calMonth;
    for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
    for(let d=1;d<=daysInMonth;d++){
      const el=document.createElement('div');el.className='cal-day';
      if(isCurMon&&d===today.getDate())el.classList.add('today');
      if(d===selectedDay)el.classList.add('selected');
      const num=document.createElement('span');num.textContent=d;el.appendChild(num);
      const dots=document.createElement('div');dots.className='cal-dots';
      (dotData[d]||['var(--border)']).forEach(c=>{const dot=document.createElement('div');dot.className='cal-dot';dot.style.background=c;dots.appendChild(dot);});
      el.appendChild(dots);
      el.onclick=()=>{selectedDay=d;renderCalendar();};
      grid.appendChild(el);
    }
    renderDetail();
  }

  function renderDetail() {
    const detail = document.getElementById('calDetail');
    const today = new Date();
    const isToday = today.getFullYear()===calYear&&today.getMonth()+1===calMonth&&today.getDate()===selectedDay;
    const days=['일','월','화','수','목','금','토'];
    const d = selectedDay||today.getDate();
    const dow = days[new Date(calYear,calMonth-1,d).getDay()];
    const habits = loadData().filter(h=>h.type==='habit');
    detail.innerHTML = `
      <div class="cal-detail-header">
        <span>📅</span>
        <span class="cal-detail-date">${calMonth}월 ${d}일 (${dow})</span>
        ${isToday?'<span class="cal-today-tag">오늘</span>':''}
      </div>
      ${habits.map(h=>`
        <div class="cal-habit-row">
          <div class="cal-check" style="border-color:var(--border)"></div>
          <span class="cal-habit-name">${h.name}</span>
          <span>${h.icon}</span>
        </div>
      `).join('')}
      <div class="cal-stats">
        <div class="cal-stat"><div class="cal-stat-val" style="color:var(--yellow)">0/${habits.length}</div><div class="cal-stat-label">습관 완료</div></div>
        <div class="cal-stat"><div class="cal-stat-val" style="color:var(--blue)">0/0</div><div class="cal-stat-label">할일 완료</div></div>
        <div class="cal-stat"><div class="cal-stat-val" style="color:var(--green)">💪 0%</div><div class="cal-stat-label">달성률</div></div>
      </div>
    `;
  }

  showStep('stepType');
  init();
</script>
</body>
</html>
