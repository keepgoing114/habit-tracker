<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>데일리 루틴</title>
  <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="데일리루틴">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#FFB800">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    input, button, textarea { font-family: inherit; }
    ::-webkit-scrollbar { display:none; }
    body { font-family: 'Apple SD Gothic Neo','Pretendard',sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;

const DAYS_KO = ["일","월","화","수","목","금","토"];

const DEFAULT_HABITS = [
  { id:1, name:"독서 30p",     sticker:"💎", color:"#4A9EFF", block:"morning" },
  { id:2, name:"블로그 글쓰기", sticker:"⭐", color:"#FFB800", block:"morning" },
  { id:3, name:"운동 30분",     sticker:"🔥", color:"#FF6B35", block:"afternoon" },
  { id:4, name:"일본어 10분",   sticker:"🍀", color:"#2DCB73", block:"evening" },
  { id:5, name:"영어문장 10개", sticker:"🌟", color:"#B06EFF", block:"morning" },
];

const DEFAULT_TODOS = {
  morning:   ["미팅 자료 준비"],
  afternoon: ["클라이언트 피드백 확인"],
  evening:   ["쇼츠 기획 1개"],
};

const BLOCKS = [
  { id:"morning",   label:"오전", time:"05:30 — 12:00", color:"#FFB800", bg:"rgba(255,184,0,0.08)",    border:"rgba(255,184,0,0.22)"    },
  { id:"afternoon", label:"오후", time:"12:00 — 18:00", color:"#2DCB73", bg:"rgba(45,203,115,0.08)",   border:"rgba(45,203,115,0.22)"   },
  { id:"evening",   label:"저녁", time:"18:00 — 24:00", color:"#B06EFF", bg:"rgba(176,110,255,0.08)",  border:"rgba(176,110,255,0.22)"  },
];

const STICKER_OPTIONS = ["⭐","🔥","💎","🌟","🍀","🌸","🎯","💫","🏆","🍭","🌈","💜","❤️","🧡","💛"];
const COLOR_OPTIONS   = ["#FFB800","#FF6B35","#4A9EFF","#B06EFF","#2DCB73","#F06292","#E85D3F","#00BCD4"];

const THEME = {
  dark: {
    appBg:"#0D1220", cardBg:"rgba(255,255,255,0.05)", headerBg:"#0D1220",
    border:"rgba(255,255,255,0.09)", text:"#F0EDE8", textSub:"rgba(255,255,255,0.38)",
    tabOff:"rgba(255,255,255,0.3)", rowLine:"rgba(255,255,255,0.05)",
    addTxt:"rgba(255,255,255,0.25)", emptyDot:"rgba(255,255,255,0.07)",
    inputBg:"rgba(255,255,255,0.07)", statBg:"rgba(255,255,255,0.05)",
    todoTag:"rgba(255,255,255,0.09)", todoTagTxt:"rgba(255,255,255,0.35)",
    calHover:"rgba(255,255,255,0.05)",
  },
  light: {
    appBg:"#F2F2F7", cardBg:"#FFFFFF", headerBg:"#FFFFFF",
    border:"rgba(0,0,0,0.09)", text:"#1C1C1E", textSub:"rgba(0,0,0,0.4)",
    tabOff:"rgba(0,0,0,0.3)", rowLine:"rgba(0,0,0,0.05)",
    addTxt:"rgba(0,0,0,0.3)", emptyDot:"rgba(0,0,0,0.07)",
    inputBg:"#F2F2F7", statBg:"#F2F2F7",
    todoTag:"rgba(0,0,0,0.06)", todoTagTxt:"rgba(0,0,0,0.38)",
    calHover:"rgba(0,0,0,0.04)",
  },
};

function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = v => { setVal(v); try { localStorage.setItem(key, JSON.stringify(v)); } catch {} };
  return [val, set];
}

const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const shiftDate = (str, n) => {
  const d = new Date(str + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
};
const fmtDate = (str) => {
  const d = new Date(str + "T00:00:00");
  return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()} (${DAYS_KO[d.getDay()]})`;
};
const fmtShort = (str) => {
  const d = new Date(str + "T00:00:00");
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS_KO[d.getDay()]})`;
};

function App() {
  const [isDark, setIsDark]       = useStorage("dr-dark", true);
  const [habits, setHabits]       = useStorage("dr-habits", DEFAULT_HABITS);
  const [checks, setChecks]       = useStorage("dr-checks", {});
  const [todos, setTodos]         = useStorage("dr-todos", DEFAULT_TODOS);
  const [todoDone, setTodoDone]   = useStorage("dr-tdone", {});
  const [tab, setTab]             = useState("today");
  const [viewDate, setViewDate]   = useState(todayKey());
  const [calDay, setCalDay]       = useState(() => new Date().getDate());
  const [calMonth, setCalMonth]   = useState(() => ({ y: new Date().getFullYear(), m: new Date().getMonth() }));
  const [addingIn, setAddingIn]   = useState(null);
  const [newTxt, setNewTxt]       = useState("");
  const [editHabit, setEditHabit] = useState(null);
  const [newHabit, setNewHabit]   = useState({ name:"", sticker:"⭐", color:"#FFB800", block:"morning" });
  const inputRef = useRef(null);
  const fileRef  = useRef(null);

  const T = isDark ? THEME.dark : THEME.light;
  const TODAY = todayKey();

  const toggleHabit = id => {
    const cur = checks[viewDate] || [];
    setChecks({ ...checks, [viewDate]: cur.includes(id) ? cur.filter(x=>x!==id) : [...cur, id] });
  };
  const toggleTodo = (block, idx) => {
    const k = `${viewDate}-${block}-${idx}`;
    setTodoDone({ ...todoDone, [k]: !todoDone[k] });
  };
  const addTodo = block => {
    if (!newTxt.trim()) { setAddingIn(null); return; }
    setTodos({ ...todos, [block]: [...(todos[block]||[]), newTxt.trim()] });
    setNewTxt(""); setAddingIn(null);
  };
  const removeTodo = (block, idx) => {
    const arr = [...(todos[block]||[])];
    arr.splice(idx,1);
    setTodos({ ...todos, [block]: arr });
  };
  const goCalendar = () => {
    const d = new Date(viewDate + "T00:00:00");
    setCalMonth({ y: d.getFullYear(), m: d.getMonth() });
    setCalDay(d.getDate());
    setTab("calendar");
  };

  /* ── 백업 / 복원 ── */
  const exportData = () => {
    const data = { habits, checks, todos, todoDone, isDark };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `dailyroutine-${todayKey()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.habits)             setHabits(d.habits);
        if (d.checks)             setChecks(d.checks);
        if (d.todos)              setTodos(d.todos);
        if (d.todoDone)           setTodoDone(d.todoDone);
        if (d.isDark !== undefined) setIsDark(d.isDark);
        alert("✅ 복원 완료!");
      } catch { alert("❌ 파일 오류! 올바른 백업 파일인지 확인해주세요."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const daysInMonth = (y,m) => new Date(y, m+1, 0).getDate();
  const firstDow    = (y,m) => new Date(y, m, 1).getDay();
  const calDateStr  = (d) => `${calMonth.y}-${String(calMonth.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  const card = { background: T.cardBg, border:`1px solid ${T.border}`, borderRadius:14, transition:"background 0.3s" };

  useEffect(() => { document.body.style.background = T.appBg; }, [T.appBg]);
  useEffect(() => { if (addingIn && inputRef.current) inputRef.current.focus(); }, [addingIn]);

  return (
    <div style={{ minHeight:"100vh", background:T.appBg, color:T.text, maxWidth:420, margin:"0 auto", paddingBottom:80, transition:"background 0.3s, color 0.3s" }}>

      {/* 헤더 */}
      <div style={{ background:T.headerBg, padding:"22px 18px 0", borderBottom:`1px solid ${T.border}`, position:"sticky", top:0, zIndex:20, transition:"background 0.3s" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
          <div>
            <div style={{ fontSize:21, fontWeight:900, letterSpacing:"-0.5px", background:"linear-gradient(90deg,#FFB800,#FF6B35,#B06EFF)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>데일리 루틴</div>
            <div style={{ fontSize:10, color:T.textSub, marginTop:2 }}>습관 + 할일 기록</div>
          </div>
          <button onClick={()=>setIsDark(!isDark)} style={{ background:T.cardBg, border:`1px solid ${T.border}`, borderRadius:20, padding:"5px 14px", fontSize:11, color:T.textSub, cursor:"pointer", marginTop:4 }}>
            {isDark ? "☀️ 라이트" : "🌙 다크"}
          </button>
        </div>
        <div style={{ display:"flex" }}>
          {[["today","오늘"],["calendar","달력"],["edit","편집"]].map(([id,label]) => (
            <button key={id} onClick={()=>setTab(id)} style={{
              background:"none", border:"none", fontWeight:700, fontSize:13,
              padding:"8px 18px 12px", cursor:"pointer",
              color: tab===id ? "#FFB800" : T.tabOff,
              borderBottom: tab===id ? "2px solid #FFB800" : "2px solid transparent",
              transition:"all 0.2s",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* 오늘 탭 */}
      {tab==="today" && (
        <div style={{ padding:"14px 16px" }}>
          <div style={{ ...card, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"11px 16px", marginBottom:14 }}>
            <button onClick={()=>setViewDate(shiftDate(viewDate,-1))} style={{ background:"none", border:"none", fontSize:20, color:T.textSub, cursor:"pointer", padding:"0 4px" }}>‹</button>
            <div style={{ textAlign:"center", cursor:"pointer" }} onClick={goCalendar}>
              <div style={{ fontSize:15, fontWeight:900, color:T.text }}>{fmtDate(viewDate)}</div>
              <div style={{ fontSize:10, color:T.textSub, marginTop:2 }}>
                {(checks[viewDate]||[]).length}/{habits.length}개 완료
                {viewDate!==TODAY && <span style={{ color:"#FFB800", marginLeft:6 }}>· 소급 수정 중</span>}
              </div>
            </div>
            {viewDate === TODAY
              ? <div style={{ background:"linear-gradient(135deg,#FFB800,#FF6B35)", borderRadius:10, padding:"4px 12px", fontSize:10, fontWeight:800, color:"#fff" }}>오늘</div>
              : <button onClick={()=>setViewDate(shiftDate(viewDate,1))} style={{ background:"none", border:"none", fontSize:20, color:T.textSub, cursor:"pointer", padding:"0 4px" }}>›</button>
            }
          </div>

          {BLOCKS.map(b => {
            const blockHabits = habits.filter(h=>h.block===b.id);
            const blockTodos  = todos[b.id] || [];
            const dayChecks   = checks[viewDate] || [];
            return (
              <div key={b.id} style={{ background:b.bg, border:`1px solid ${b.border}`, borderRadius:14, marginBottom:10, overflow:"hidden" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 14px" }}>
                  <div style={{ width:7, height:7, borderRadius:"50%", background:b.color, flexShrink:0 }}/>
                  <div style={{ fontSize:12, fontWeight:800, color:b.color }}>{b.label}</div>
                  <div style={{ fontSize:10, color:b.color, opacity:0.5, marginLeft:"auto" }}>{b.time}</div>
                </div>
                {blockHabits.map(h => {
                  const done = dayChecks.includes(h.id);
                  return (
                    <div key={h.id} onClick={()=>toggleHabit(h.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 14px", borderTop:`1px solid ${T.rowLine}`, cursor:"pointer" }}>
                      <div style={{ width:22, height:22, borderRadius:"50%", flexShrink:0, border:done?`2px solid ${h.color}`:`2px dashed ${h.color}55`, background:done?`${h.color}22`:"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:h.color, transition:"all 0.2s" }}>
                        {done && "✓"}
                      </div>
                      <div style={{ fontSize:12, flex:1, color:T.text, textDecoration:done?"line-through":"none", opacity:done?0.38:1, transition:"all 0.2s" }}>{h.name}</div>
                      <div style={{ fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:8, background:`${h.color}18`, color:h.color, flexShrink:0 }}>{h.sticker} 습관</div>
                    </div>
                  );
                })}
                {blockTodos.map((todo,i) => {
                  const k = `${viewDate}-${b.id}-${i}`;
                  const done = !!todoDone[k];
                  return (
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 14px", borderTop:`1px solid ${T.rowLine}` }}>
                      <div onClick={()=>toggleTodo(b.id,i)} style={{ width:22, height:22, borderRadius:"50%", flexShrink:0, border:done?"2px solid #888":"2px dashed rgba(128,128,128,0.35)", background:done?"rgba(128,128,128,0.15)":"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, color:"#888", cursor:"pointer", transition:"all 0.2s" }}>
                        {done && "✓"}
                      </div>
                      <div onClick={()=>toggleTodo(b.id,i)} style={{ fontSize:12, flex:1, color:T.text, textDecoration:done?"line-through":"none", opacity:done?0.38:1, cursor:"pointer", transition:"all 0.2s" }}>{todo}</div>
                      <div style={{ fontSize:10, fontWeight:600, padding:"2px 8px", borderRadius:8, background:T.todoTag, color:T.todoTagTxt, flexShrink:0 }}>할일</div>
                      <button onClick={()=>removeTodo(b.id,i)} style={{ background:"none", border:"none", color:"rgba(232,93,63,0.4)", fontSize:14, cursor:"pointer", padding:"0 2px", lineHeight:1 }}>✕</button>
                    </div>
                  );
                })}
                {addingIn===b.id ? (
                  <div style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 14px", borderTop:`1px solid ${T.rowLine}` }}>
                    <div style={{ width:22, height:22, borderRadius:"50%", border:"2px dashed rgba(128,128,128,0.3)", flexShrink:0 }}/>
                    <input ref={inputRef} value={newTxt} onChange={e=>setNewTxt(e.target.value)}
                      onKeyDown={e=>{ if(e.key==="Enter") addTodo(b.id); if(e.key==="Escape"){setAddingIn(null);setNewTxt("");} }}
                      onBlur={()=>addTodo(b.id)}
                      placeholder="할일 입력 후 Enter"
                      style={{ flex:1, background:"transparent", border:"none", outline:"none", fontSize:12, color:T.text }}
                    />
                  </div>
                ) : (
                  <div onClick={()=>setAddingIn(b.id)} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 14px", borderTop:`1px solid ${T.rowLine}`, cursor:"pointer" }}>
                    <span style={{ fontSize:16, color:b.color, opacity:0.45 }}>+</span>
                    <span style={{ fontSize:11, color:T.addTxt }}>할일 추가</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* 달력 탭 */}
      {tab==="calendar" && (
        <div style={{ padding:"14px 16px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <button onClick={()=>setCalMonth(p=>{ const d=new Date(p.y,p.m-1,1); return {y:d.getFullYear(),m:d.getMonth()}; })} style={{ background:"none", border:"none", fontSize:20, color:T.textSub, cursor:"pointer", padding:"0 6px" }}>‹</button>
            <div style={{ fontSize:15, fontWeight:800, color:T.text }}>{calMonth.y}년 {calMonth.m+1}월</div>
            <button onClick={()=>setCalMonth(p=>{ const d=new Date(p.y,p.m+1,1); return {y:d.getFullYear(),m:d.getMonth()}; })} style={{ background:"none", border:"none", fontSize:20, color:T.textSub, cursor:"pointer", padding:"0 6px" }}>›</button>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:4 }}>
            {DAYS_KO.map(d => <div key={d} style={{ textAlign:"center", fontSize:10, fontWeight:700, color:T.textSub, padding:"3px 0" }}>{d}</div>)}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
            {Array.from({length: firstDow(calMonth.y, calMonth.m)}, (_,i) => <div key={"e"+i}/>)}
            {Array.from({length: daysInMonth(calMonth.y, calMonth.m)}, (_,i) => {
              const d = i+1;
              const dStr = calDateStr(d);
              const dayChecks = checks[dStr] || [];
              const isToday = dStr === TODAY;
              const isSel   = d === calDay;
              return (
                <div key={d} onClick={()=>setCalDay(d)} style={{
                  display:"flex", flexDirection:"column", alignItems:"center",
                  padding:"5px 2px", borderRadius:10, cursor:"pointer",
                  background: isSel ? "rgba(255,184,0,0.14)" : T.calHover,
                  border: isSel ? "1.5px solid rgba(255,184,0,0.5)" : "1.5px solid transparent",
                  transition:"all 0.15s",
                }}>
                  <div style={{ fontSize:11, fontWeight:700, width:22, height:22, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", background:isToday?"#FFB800":"transparent", color:isToday?"#fff":T.text }}>
                    {d}
                  </div>
                  <div style={{ display:"flex", gap:2, marginTop:3, height:5, alignItems:"center" }}>
                    {dayChecks.length > 0
                      ? habits.filter(h=>dayChecks.includes(h.id)).map(h=>(
                          <div key={h.id} style={{ width:4, height:4, borderRadius:"50%", background:h.color }}/>
                        ))
                      : <div style={{ width:4, height:4, borderRadius:"50%", background:T.emptyDot }}/>
                    }
                  </div>
                </div>
              );
            })}
          </div>
          {(() => {
            const dStr = calDateStr(calDay);
            const dayChecks = checks[dStr] || [];
            const dayTodoDone = Object.keys(todoDone).filter(k=>k.startsWith(dStr)&&todoDone[k]).length;
            const isToday = dStr === TODAY;
            const totalTodos = Object.values(todos).flat().length;
            return (
              <div style={{ ...card, marginTop:14, padding:"14px 16px" }}>
                <div style={{ fontSize:13, fontWeight:800, color:T.text, marginBottom:12, display:"flex", alignItems:"center", gap:8 }}>
                  📅 {fmtShort(dStr)}
                  {isToday && <span style={{ fontSize:10, background:"linear-gradient(135deg,#FFB800,#FF6B35)", color:"#fff", borderRadius:8, padding:"2px 8px", fontWeight:800 }}>오늘</span>}
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                  {habits.map(h => {
                    const done = dayChecks.includes(h.id);
                    return (
                      <div key={h.id} style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <div style={{ width:18, height:18, borderRadius:"50%", border:done?`2px solid ${h.color}`:`2px dashed ${h.color}44`, background:done?`${h.color}22`:"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:h.color, flexShrink:0 }}>
                          {done&&"✓"}
                        </div>
                        <div style={{ fontSize:12, flex:1, color:T.text, textDecoration:done?"line-through":"none", opacity:done?0.4:0.85 }}>{h.name}</div>
                        <div style={{ fontSize:11 }}>{h.sticker}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  {[
                    { val:`${dayChecks.length}/${habits.length}`, label:"습관 완료", c:"#FFB800" },
                    { val:`${dayTodoDone}/${totalTodos}`, label:"할일 완료", c:"#4A9EFF" },
                    { val: dayChecks.length===habits.length?"🏆 완벽":"💪 "+Math.round(dayChecks.length/habits.length*100)+"%", label:"달성률", c:"#2DCB73" },
                  ].map(({val,label,c}) => (
                    <div key={label} style={{ flex:1, background:T.statBg, border:`1px solid ${T.border}`, borderRadius:10, padding:"8px 6px", textAlign:"center" }}>
                      <div style={{ fontSize:13, fontWeight:900, color:c }}>{val}</div>
                      <div style={{ fontSize:9, color:T.textSub, marginTop:2 }}>{label}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* 편집 탭 */}
      {tab==="edit" && (
        <div style={{ padding:"14px 16px" }}>
          {editHabit ? (
            <div>
              <button onClick={()=>setEditHabit(null)} style={{ background:"none", border:"none", color:T.textSub, fontSize:13, cursor:"pointer", marginBottom:14, padding:0, display:"flex", alignItems:"center", gap:4 }}>‹ 목록으로</button>
              <div style={{ ...card, padding:"18px 16px" }}>
                <div style={{ fontSize:14, fontWeight:800, color:T.text, marginBottom:16 }}>습관 편집</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
                  {STICKER_OPTIONS.map(s => (
                    <span key={s} onClick={()=>setEditHabit({...editHabit,sticker:s})} style={{ fontSize:22, cursor:"pointer", opacity:editHabit.sticker===s?1:0.3, transform:editHabit.sticker===s?"scale(1.3)":"scale(1)", transition:"all 0.15s" }}>{s}</span>
                  ))}
                </div>
                <input value={editHabit.name} onChange={e=>setEditHabit({...editHabit,name:e.target.value})}
                  style={{ width:"100%", background:T.inputBg, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:14, outline:"none", marginBottom:14 }}
                />
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
                  {COLOR_OPTIONS.map(c => (
                    <div key={c} onClick={()=>setEditHabit({...editHabit,color:c})} style={{ width:28, height:28, borderRadius:"50%", background:`radial-gradient(circle at 35% 35%,${c},${c}88)`, cursor:"pointer", border:editHabit.color===c?"3px solid #888":"3px solid transparent", boxSizing:"border-box", boxShadow:editHabit.color===c?`0 0 12px ${c}`:"none", transition:"all 0.15s" }}/>
                  ))}
                </div>
                <div style={{ fontSize:11, color:T.textSub, marginBottom:8 }}>시간대</div>
                <div style={{ display:"flex", gap:8, marginBottom:20 }}>
                  {BLOCKS.map(b => (
                    <button key={b.id} onClick={()=>setEditHabit({...editHabit,block:b.id})} style={{ flex:1, padding:"8px 4px", border:`1.5px solid ${editHabit.block===b.id?b.color:T.border}`, borderRadius:10, background:editHabit.block===b.id?`${b.color}18`:"transparent", color:editHabit.block===b.id?b.color:T.textSub, fontSize:12, fontWeight:700, cursor:"pointer" }}>{b.label}</button>
                  ))}
                </div>
                <button onClick={()=>{ setHabits(habits.map(h=>h.id===editHabit.id?editHabit:h)); setEditHabit(null); }} style={{ width:"100%", background:"linear-gradient(135deg,#FFB800,#FF6B35)", border:"none", color:"#fff", borderRadius:12, padding:13, fontSize:14, fontWeight:800, cursor:"pointer" }}>저장</button>
              </div>
            </div>
          ) : (
            <div>
              {habits.map((h,idx) => (
                <div key={h.id} style={{ ...card, padding:"13px 16px", marginBottom:8, display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{ width:36, height:36, borderRadius:"50%", background:`${h.color}22`, border:`1.5px solid ${h.color}55`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{h.sticker}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:T.text }}>{h.name}</div>
                    <div style={{ fontSize:10, color:T.textSub, marginTop:2 }}>
                      {BLOCKS.find(b=>b.id===h.block)?.label} · {Object.values(checks).filter(arr=>arr.includes(h.id)).length}회 기록
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:4 }}>
                    <button onClick={()=>{ if(idx===0)return; const a=[...habits];[a[idx-1],a[idx]]=[a[idx],a[idx-1]];setHabits(a); }} style={{ background:"none", border:`1px solid ${T.border}`, color:idx===0?T.border:T.textSub, borderRadius:8, padding:"4px 8px", fontSize:12, cursor:idx===0?"default":"pointer" }}>↑</button>
                    <button onClick={()=>{ if(idx===habits.length-1)return; const a=[...habits];[a[idx],a[idx+1]]=[a[idx+1],a[idx]];setHabits(a); }} style={{ background:"none", border:`1px solid ${T.border}`, color:idx===habits.length-1?T.border:T.textSub, borderRadius:8, padding:"4px 8px", fontSize:12, cursor:idx===habits.length-1?"default":"pointer" }}>↓</button>
                    <button onClick={()=>setEditHabit({...h})} style={{ background:"none", border:`1px solid ${T.border}`, color:T.textSub, borderRadius:8, padding:"4px 10px", fontSize:11, cursor:"pointer" }}>편집</button>
                    {habits.length>1 && <button onClick={()=>setHabits(habits.filter(x=>x.id!==h.id))} style={{ background:"none", border:"none", color:"#E85D3F88", fontSize:16, cursor:"pointer" }}>✕</button>}
                  </div>
                </div>
              ))}

              {/* 새 습관 추가 */}
              <div style={{ ...card, padding:"16px", marginTop:6 }}>
                <div style={{ fontSize:12, color:T.textSub, fontWeight:700, marginBottom:12 }}>+ 새 습관</div>
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                  {STICKER_OPTIONS.map(s => (
                    <span key={s} onClick={()=>setNewHabit({...newHabit,sticker:s})} style={{ fontSize:20, cursor:"pointer", opacity:newHabit.sticker===s?1:0.3, transform:newHabit.sticker===s?"scale(1.3)":"scale(1)", transition:"all 0.15s" }}>{s}</span>
                  ))}
                </div>
                <input placeholder="습관 이름 입력" value={newHabit.name} onChange={e=>setNewHabit({...newHabit,name:e.target.value})}
                  style={{ width:"100%", background:T.inputBg, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:14, outline:"none", marginBottom:12 }}
                />
                <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                  {COLOR_OPTIONS.map(c => (
                    <div key={c} onClick={()=>setNewHabit({...newHabit,color:c})} style={{ width:28, height:28, borderRadius:"50%", background:`radial-gradient(circle at 35% 35%,${c},${c}88)`, cursor:"pointer", border:newHabit.color===c?"3px solid #888":"3px solid transparent", boxSizing:"border-box", boxShadow:newHabit.color===c?`0 0 12px ${c}`:"none", transition:"all 0.15s" }}/>
                  ))}
                </div>
                <div style={{ fontSize:11, color:T.textSub, marginBottom:8 }}>시간대</div>
                <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                  {BLOCKS.map(b => (
                    <button key={b.id} onClick={()=>setNewHabit({...newHabit,block:b.id})} style={{ flex:1, padding:"7px 4px", border:`1.5px solid ${newHabit.block===b.id?b.color:T.border}`, borderRadius:10, background:newHabit.block===b.id?`${b.color}18`:"transparent", color:newHabit.block===b.id?b.color:T.textSub, fontSize:12, fontWeight:700, cursor:"pointer" }}>{b.label}</button>
                  ))}
                </div>
                <button onClick={()=>{
                  if(!newHabit.name.trim())return;
                  setHabits([...habits,{id:Date.now(),...newHabit}]);
                  setNewHabit({name:"",sticker:"⭐",color:"#FFB800",block:"morning"});
                }} style={{ width:"100%", background:"linear-gradient(135deg,#FFB800,#FF6B35)", border:"none", color:"#fff", borderRadius:12, padding:13, fontSize:14, fontWeight:800, cursor:"pointer", boxShadow:"0 4px 20px #FFB80044" }}>
                  추가하기 ✨
                </button>
              </div>

              {/* 백업 / 복원 */}
              <div style={{ ...card, padding:"16px", marginTop:10 }}>
                <div style={{ fontSize:12, color:T.textSub, fontWeight:700, marginBottom:12 }}>💾 데이터 백업</div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={exportData} style={{ flex:1, background:"linear-gradient(135deg,#4A9EFF,#4A9EFF99)", border:"none", color:"#fff", borderRadius:12, padding:12, fontSize:13, fontWeight:700, cursor:"pointer" }}>
                    📥 백업 저장
                  </button>
                  <label style={{ flex:1, background: isDark?"rgba(255,255,255,0.07)":T.inputBg, border:`1px solid ${T.border}`, color:T.text, borderRadius:12, padding:12, fontSize:13, fontWeight:700, cursor:"pointer", textAlign:"center", display:"block" }}>
                    📤 백업 복원
                    <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{ display:"none" }} />
                  </label>
                </div>
                <div style={{ fontSize:10, color:T.textSub, marginTop:8, textAlign:"center" }}>
                  폰 교체 전 백업 저장 → 새 폰에서 복원
                </div>
              </div>

            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
