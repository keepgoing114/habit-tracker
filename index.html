<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>습관 스티커북</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#0D1220; }
    input, button { font-family: inherit; }
    ::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

const DEFAULT_HABITS = [
  { id: 1, name: "블로그 글쓰기", emoji: "✍️", sticker: "⭐", color: "#FFB800" },
  { id: 2, name: "운동 30분", emoji: "🏃", sticker: "🔥", color: "#FF6B35" },
  { id: 3, name: "독서 20분", emoji: "📚", sticker: "💎", color: "#4A9EFF" },
  { id: 4, name: "쇼츠 기획", emoji: "🎬", sticker: "🌟", color: "#B06EFF" },
];

const STICKER_OPTIONS = ["⭐","🔥","💎","🌟","🍀","🌸","🎯","💫","🏆","🍭","🌈","💜","❤️","🧡","💛"];
const COLOR_OPTIONS = ["#FFB800","#FF6B35","#4A9EFF","#B06EFF","#2DCB73","#F06292","#E85D3F","#00BCD4"];
const TOTAL = 66;

const THEME = {
  dark: {
    bg: "linear-gradient(160deg, #1A0E2E 0%, #0D1220 50%, #1A1A0A 100%)",
    surface: "rgba(255,255,255,0.04)",
    border: "rgba(255,255,255,0.08)",
    text: "#F0EDE8",
    textSub: "rgba(255,255,255,0.4)",
    inputBg: "rgba(255,255,255,0.06)",
    modalBg: "#1A1A2E",
    headerBorder: "rgba(255,255,255,0.06)",
    progressTrack: "rgba(255,255,255,0.08)",
    stickerEmpty: "rgba(255,255,255,0.06)",
    stickerEmptyBorder: "rgba(255,255,255,0.1)",
    stickerEmptyNum: "rgba(255,255,255,0.08)",
    tabInactive: "rgba(255,255,255,0.3)",
    tagInactive: "rgba(255,255,255,0.06)",
    tagInactiveText: "rgba(255,255,255,0.4)",
    dashed: "rgba(255,255,255,0.1)",
    overlay: "rgba(0,0,0,0.7)",
    bookCard: "linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02))",
    doneBg: "22",
  },
  light: {
    bg: "linear-gradient(160deg, #FFF8ED 0%, #EEF4FF 50%, #FAFAFA 100%)",
    surface: "rgba(0,0,0,0.03)",
    border: "rgba(0,0,0,0.09)",
    text: "#1A1A2E",
    textSub: "rgba(0,0,0,0.42)",
    inputBg: "rgba(0,0,0,0.04)",
    modalBg: "#FFFFFF",
    headerBorder: "rgba(0,0,0,0.07)",
    progressTrack: "rgba(0,0,0,0.07)",
    stickerEmpty: "rgba(0,0,0,0.05)",
    stickerEmptyBorder: "rgba(0,0,0,0.13)",
    stickerEmptyNum: "rgba(0,0,0,0.13)",
    tabInactive: "rgba(0,0,0,0.35)",
    tagInactive: "rgba(0,0,0,0.06)",
    tagInactiveText: "rgba(0,0,0,0.4)",
    dashed: "rgba(0,0,0,0.12)",
    overlay: "rgba(0,0,0,0.45)",
    bookCard: "rgba(255,255,255,0.9)",
    doneBg: "18",
  },
};

function useStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch { return init; }
  });
  const set = (v) => { setVal(v); try { localStorage.setItem(key, JSON.stringify(v)); } catch {} };
  return [val, set];
}

const getTodayKey = () => new Date().toISOString().slice(0, 10);

function StickerCell({ state, sticker, color, index, t }) {
  if (state === "done") return (
    <div style={{
      width:"100%", aspectRatio:"1",
      background:`radial-gradient(circle at 35% 35%, ${color}FF, ${color}99)`,
      borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
      fontSize:"clamp(10px, 3vw, 16px)",
      boxShadow:`0 2px 8px ${color}66, inset 0 1px 2px rgba(255,255,255,0.4)`,
      position:"relative", border:`1.5px solid ${color}CC`,
    }}>
      {sticker}
      <div style={{ position:"absolute", top:"15%", left:"20%", width:"30%", height:"15%",
        background:"rgba(255,255,255,0.5)", borderRadius:"50%", transform:"rotate(-30deg)" }} />
    </div>
  );
  // future와 empty 모두 빈 원으로 표시 (번호 포함)
  return (
    <div style={{
      width:"100%", aspectRatio:"1",
      background: state === "future" ? "rgba(255,255,255,0.02)" : t.stickerEmpty,
      borderRadius:"50%",
      border: `1.5px dashed ${state === "future" ? "rgba(255,255,255,0.05)" : t.stickerEmptyBorder}`,
      display:"flex", alignItems:"center", justifyContent:"center",
      fontSize:"clamp(7px, 2vw, 10px)",
      color: state === "future" ? "rgba(255,255,255,0.04)" : t.stickerEmptyNum,
    }}>{index+1}</div>
  );
}

function Burst({ x, y, color, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 700); return () => clearTimeout(t); }, []);
  const particles = Array.from({length:8}, (_,i) => ({ angle:(i/8)*360, dist:40+Math.random()*20, delay:Math.random()*100 }));
  return (
    <div style={{ position:"fixed", left:x, top:y, pointerEvents:"none", zIndex:9999 }}>
      {particles.map((p,i) => (
        <div key={i} style={{
          position:"absolute", width:8, height:8, background:color, borderRadius:"50%",
          transform:`rotate(${p.angle}deg) translateY(-${p.dist}px)`, opacity:0,
          animation:`burst 0.6s ${p.delay}ms ease-out forwards`,
        }} />
      ))}
    </div>
  );
}

function HabitSticker() {
  const [habits, setHabits] = useStorage("hs-habits", DEFAULT_HABITS);
  const [checks, setChecks] = useStorage("hs-checks", {});
  const [startDates, setStartDates] = useStorage("hs-starts", {});
  const [isDark, setIsDark] = useStorage("hs-theme", true);
  const [view, setView] = useState("today");
  const [bursts, setBursts] = useState([]);
  const [newStamp, setNewStamp] = useState(null);
  const [editHabit, setEditHabit] = useState(null);
  const [newHabit, setNewHabit] = useState({ name:"", emoji:"🌟", sticker:"⭐", color:"#FFB800" });
  const [selectedHabit, setSelectedHabit] = useState(habits[0]?.id);
  const [viewDate, setViewDate] = useState(getTodayKey());

  const t = isDark ? THEME.dark : THEME.light;
  const today = getTodayKey();
  const isToday = viewDate === today;

  const shiftDate = (dateStr, days) => {
    const d = new Date(dateStr); d.setDate(d.getDate()+days);
    return d.toISOString().slice(0,10);
  };
  const fmtDate = (dateStr) => {
    const d = new Date(dateStr);
    const days = ["일","월","화","수","목","금","토"];
    if (dateStr === today) return "오늘";
    if (dateStr === shiftDate(today,-1)) return "어제";
    return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  };

  const isCheckedToday = (id) => !!checks[`${id}-${viewDate}`];
  const getTotalDone = (id) => Object.keys(checks).filter(k => k.startsWith(`${id}-`) && checks[k]).length;
  const getStreak = (id) => {
    let s=0, d=new Date();
    while(true) { const k=`${id}-${d.toISOString().slice(0,10)}`; if(checks[k]){s++;d.setDate(d.getDate()-1);}else break; }
    return s;
  };

  const handleCheck = (habit, e) => {
    const key = `${habit.id}-${viewDate}`;
    const wasDone = !!checks[key];
    setChecks({ ...checks, [key]: !wasDone });
    if (!wasDone) {
      if (!startDates[habit.id]) setStartDates({ ...startDates, [habit.id]: viewDate });
      const rect = e.currentTarget.getBoundingClientRect();
      const id = Date.now();
      setBursts(b => [...b, { id, x:rect.left+rect.width/2, y:rect.top+rect.height/2, color:habit.color }]);
      setNewStamp(habit.id);
      setTimeout(() => setNewStamp(null), 600);
    }
  };

  const get66Data = (habitId) => {
    const start = startDates[habitId] || today;
    const startD = new Date(start);
    return Array.from({length:TOTAL}, (_,i) => {
      const d = new Date(startD); d.setDate(d.getDate()+i);
      const key = `${habitId}-${d.toISOString().slice(0,10)}`;
      const isPast = d <= new Date();
      if (!isPast) return { state:"future" };
      return { state: checks[key] ? "done" : "empty" };
    });
  };

  const allDone = habits.every(h => isCheckedToday(h.id)) && isToday;

  const inputStyle = {
    width:"100%", background:t.inputBg, border:`1px solid ${t.border}`,
    borderRadius:10, padding:"10px 14px", color:t.text,
    fontSize:14, outline:"none", boxSizing:"border-box",
    fontFamily:"'Apple SD Gothic Neo','Pretendard',sans-serif",
  };

  return (
    <div style={{
      minHeight:"100vh", background:t.bg, color:t.text,
      fontFamily:"'Apple SD Gothic Neo','Pretendard',sans-serif",
      maxWidth:420, margin:"0 auto", paddingBottom:80,
      transition:"background 0.35s, color 0.35s",
    }}>
      <style>{`
        @keyframes burst { 0%{opacity:1;transform:rotate(var(--a,0deg)) translateY(-10px);}
          100%{opacity:0;transform:rotate(var(--a,0deg)) translateY(-50px) scale(0);} }
        @keyframes stamp { 0%{transform:scale(2.5);opacity:0;} 40%{transform:scale(0.85);opacity:1;}
          70%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }
        @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
      `}</style>

      {bursts.map(b => (
        <Burst key={b.id} x={b.x} y={b.y} color={b.color}
          onDone={() => setBursts(bs => bs.filter(x => x.id !== b.id))} />
      ))}

      {/* Header */}
      <div style={{ padding:"24px 20px 0", borderBottom:`1px solid ${t.headerBorder}` }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div>
            <div style={{
              fontSize:22, fontWeight:900, letterSpacing:"-0.5px",
              background:"linear-gradient(90deg, #FFB800, #FF6B35, #B06EFF)",
              WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
            }}>습관 스티커북</div>
            <div style={{ fontSize:11, color:t.textSub, marginTop:2 }}>66일 완성 프로젝트</div>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            {allDone && (
              <div style={{
                background:"linear-gradient(135deg, #FFB800, #FF6B35)",
                borderRadius:20, padding:"6px 12px",
                fontSize:11, fontWeight:800, color:"#fff",
                animation:"float 2s ease-in-out infinite",
                boxShadow:"0 4px 20px #FFB80066",
              }}>🏆 완벽한 하루!</div>
            )}
            {/* 테마 토글 - 항상 표시 */}
            <button onClick={() => setIsDark(!isDark)} style={{
              width:56, height:30,
              background: isDark ? "#2A2A40" : "#E8DFD0",
              border:`2px solid ${isDark ? "#4A4A70" : "#C8B89A"}`,
              borderRadius:20, cursor:"pointer", position:"relative",
              transition:"background 0.3s, border 0.3s", flexShrink:0,
              padding:0,
            }}>
              <div style={{
                position:"absolute", top:3,
                left: isDark ? 27 : 3,
                width:20, height:20, borderRadius:"50%",
                background: isDark ? "#6B6B99" : "#FFF8E8",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:12, boxShadow:"0 1px 4px rgba(0,0,0,0.3)",
                transition:"left 0.25s cubic-bezier(0.34,1.56,0.64,1)",
              }}>{isDark ? "🌙" : "☀️"}</div>
            </button>
          </div>
        </div>

        <div style={{ display:"flex", gap:0 }}>
          {[["today","오늘"],["book","스티커북"],["edit","편집"]].map(([id,label]) => (
            <button key={id} onClick={() => setView(id)} style={{
              background:"none", border:"none",
              color: view===id ? "#FFB800" : t.tabInactive,
              fontWeight:700, fontSize:13, padding:"10px 18px 12px",
              borderBottom: view===id ? "2px solid #FFB800" : "2px solid transparent",
              cursor:"pointer",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* TODAY */}
      {view==="today" && (
        <div style={{ padding:"20px 20px 24px" }}>
          {/* 날짜 네비게이터 */}
          <div style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            marginBottom:16, background:t.surface,
            borderRadius:14, padding:"10px 14px",
            border:`1px solid ${t.border}`,
          }}>
            <button onClick={() => setViewDate(shiftDate(viewDate,-1))} style={{
              background:"none", border:"none", color:t.textSub,
              fontSize:18, cursor:"pointer", padding:"0 4px", lineHeight:1,
            }}>‹</button>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:14, fontWeight:800, color:t.text }}>{fmtDate(viewDate)}</div>
              <div style={{ fontSize:10, color:t.textSub, marginTop:1 }}>
                {habits.filter(h=>isCheckedToday(h.id)).length}/{habits.length}개 완료
                {!isToday && <span style={{ color:"#FFB800", marginLeft:6 }}>· 소급 수정 중</span>}
              </div>
            </div>
            <button
              onClick={() => { if (!isToday) setViewDate(shiftDate(viewDate,1)); }}
              style={{
                background:"none", border:"none",
                color: isToday ? t.border : t.textSub,
                fontSize:18, cursor: isToday ? "default" : "pointer", padding:"0 4px", lineHeight:1,
              }}>›</button>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {habits.map(habit => {
              const done = isCheckedToday(habit.id);
              const total = getTotalDone(habit.id);
              const streak = getStreak(habit.id);
              const pct = Math.min((total/TOTAL)*100, 100);
              const isNew = newStamp === habit.id;
              return (
                <div key={habit.id} onClick={(e) => handleCheck(habit,e)} style={{
                  background: done ? `linear-gradient(135deg, ${habit.color}${t.doneBg}, ${habit.color}08)` : t.surface,
                  border:`1px solid ${done ? habit.color+"55" : t.border}`,
                  borderRadius:18, padding:"18px 18px 16px",
                  cursor:"pointer", transition:"all 0.2s",
                  position:"relative", overflow:"hidden",
                  boxShadow: done ? `0 2px 20px ${habit.color}22` : "none",
                }}>
                  {done && <div style={{
                    position:"absolute", inset:0,
                    background:`radial-gradient(ellipse at 50% 0%, ${habit.color}14, transparent 70%)`,
                    pointerEvents:"none",
                  }} />}
                  <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                    <div style={{
                      width:56, height:56, flexShrink:0,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      background: done ? `radial-gradient(circle at 35% 35%, ${habit.color}FF, ${habit.color}88)` : t.stickerEmpty,
                      borderRadius:"50%", fontSize:26,
                      boxShadow: done ? `0 4px 20px ${habit.color}66, inset 0 1px 3px rgba(255,255,255,0.3)` : "none",
                      border: done ? `2px solid ${habit.color}AA` : `2px dashed ${t.stickerEmptyBorder}`,
                      animation: isNew ? "stamp 0.5s cubic-bezier(0.34,1.56,0.64,1)" : "none",
                      position:"relative", overflow:"hidden", transition:"all 0.3s",
                    }}>
                      {done ? habit.sticker : <span style={{opacity:0.2}}>{habit.sticker}</span>}
                      {done && <div style={{
                        position:"absolute", top:"10%", left:"18%", width:"35%", height:"18%",
                        background:"rgba(255,255,255,0.45)", borderRadius:"50%", transform:"rotate(-25deg)",
                      }} />}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                        <span style={{fontSize:15}}>{habit.emoji}</span>
                        <span style={{ fontSize:15, fontWeight:700, color: done ? t.text : t.textSub }}>{habit.name}</span>
                      </div>
                      <div style={{ height:6, background:t.progressTrack, borderRadius:10, overflow:"hidden", marginBottom:6 }}>
                        <div style={{
                          height:"100%", width:`${pct}%`,
                          background: total>=TOTAL ? `linear-gradient(90deg, ${habit.color}, #FFB800)` : habit.color,
                          borderRadius:10, transition:"width 0.5s cubic-bezier(0.34,1.56,0.64,1)",
                          boxShadow:`0 0 8px ${habit.color}88`,
                        }} />
                      </div>
                      <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                        <span style={{ fontSize:11, color:habit.color, fontWeight:700 }}>{total}/{TOTAL}개</span>
                        {streak>0 && <span style={{ fontSize:10, color:t.textSub }}>🔥 {streak}일 연속</span>}
                        {total>=TOTAL && (
                          <span style={{
                            fontSize:10, fontWeight:800,
                            background:"linear-gradient(90deg, #FFB800, #FF6B35)",
                            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
                          }}>★ 66일 달성!</span>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 스티커북 */}
      {view==="book" && (
        <div style={{ padding:"20px 16px" }}>
          <div style={{ display:"flex", gap:8, marginBottom:20, overflowX:"auto", paddingBottom:4, scrollbarWidth:"none" }}>
            {habits.map(h => (
              <button key={h.id} onClick={() => setSelectedHabit(h.id)} style={{
                background: selectedHabit===h.id ? h.color : t.tagInactive,
                border:"none", color: selectedHabit===h.id ? "#fff" : t.tagInactiveText,
                borderRadius:20, padding:"6px 14px", fontSize:12,
                fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0,
                boxShadow: selectedHabit===h.id ? `0 4px 14px ${h.color}66` : "none",
                transition:"all 0.2s",
              }}>{h.emoji} {h.name}</button>
            ))}
          </div>
          {(() => {
            const habit = habits.find(h => h.id===selectedHabit) || habits[0];
            if (!habit) return null;
            const grid = get66Data(habit.id);
            const total = getTotalDone(habit.id);
            const pct = Math.min((total/TOTAL)*100, 100);
            return (
              <div style={{
                background:t.bookCard, border:`1px solid ${habit.color}33`,
                borderRadius:20, padding:"20px 16px",
                boxShadow:`0 8px 40px ${habit.color}22`,
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <div>
                    <div style={{ fontSize:16, fontWeight:800, color:t.text }}>{habit.emoji} {habit.name}</div>
                    <div style={{ fontSize:11, color:t.textSub, marginTop:2 }}>
                      {total}개 모음 · {TOTAL-total}개 남음
                    </div>
                  </div>
                  <div style={{
                    fontSize:28,
                    background:`radial-gradient(circle at 35% 35%, ${habit.color}FF, ${habit.color}88)`,
                    width:48, height:48, borderRadius:"50%",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    boxShadow:`0 4px 16px ${habit.color}66`,
                    border:`2px solid ${habit.color}AA`, flexShrink:0,
                  }}>{habit.sticker}</div>
                </div>
                <div style={{ marginBottom:16 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                    <span style={{ fontSize:11, color:t.textSub }}>진행률</span>
                    <span style={{ fontSize:11, fontWeight:700, color:habit.color }}>{Math.round(pct)}%</span>
                  </div>
                  <div style={{ height:8, background:t.progressTrack, borderRadius:10, overflow:"hidden" }}>
                    <div style={{
                      height:"100%", width:`${pct}%`,
                      background:`linear-gradient(90deg, ${habit.color}, ${habit.color}CC)`,
                      borderRadius:10, transition:"width 0.5s",
                      boxShadow:`0 0 12px ${habit.color}88`,
                    }} />
                  </div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(11, 1fr)", gap:5 }}>
                  {grid.map((cell,i) => (
                    <StickerCell key={i} index={i} state={cell.state}
                      sticker={habit.sticker} color={habit.color} t={t} />
                  ))}
                </div>
                {total>=TOTAL && (
                  <div style={{
                    marginTop:16, textAlign:"center", padding:"12px",
                    background:`linear-gradient(135deg, ${habit.color}22, transparent)`,
                    borderRadius:12, border:`1px solid ${habit.color}44`,
                  }}>
                    <div style={{fontSize:24}}>🏆</div>
                    <div style={{
                      fontSize:13, fontWeight:900, marginTop:4,
                      background:"linear-gradient(90deg, #FFB800, #FF6B35)",
                      WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
                    }}>66일 완성! 습관이 됐어요 🎉</div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      )}

      {/* EDIT */}
      {view==="edit" && (
        <div style={{ padding:"20px 16px" }}>
          {habits.map((habit,idx) => (
            <div key={habit.id} style={{
              background:t.surface, border:`1px solid ${t.border}`,
              borderRadius:14, padding:"14px 16px", marginBottom:10,
              display:"flex", alignItems:"center", gap:12,
            }}>
              <div style={{
                width:36, height:36, borderRadius:"50%",
                background:`radial-gradient(circle at 35% 35%, ${habit.color}, ${habit.color}88)`,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:18, flexShrink:0, boxShadow:`0 2px 10px ${habit.color}55`,
              }}>{habit.sticker}</div>
              <div style={{flex:1}}>
                <div style={{ fontSize:13, fontWeight:700, color:t.text }}>{habit.name}</div>
                <div style={{ fontSize:11, color:t.textSub }}>{habit.emoji} · {getTotalDone(habit.id)}/{TOTAL}</div>
              </div>
              <button onClick={() => setEditHabit({...habit,idx})} style={{
                background:t.surface, border:`1px solid ${t.border}`,
                color:t.textSub, borderRadius:8, padding:"5px 12px", fontSize:11, cursor:"pointer",
              }}>편집</button>
              {habits.length>1 && (
                <button onClick={() => setHabits(habits.filter((_,i)=>i!==idx))} style={{
                  background:"none", border:"none", color:"#E85D3F88", fontSize:16, cursor:"pointer",
                }}>✕</button>
              )}
            </div>
          ))}
          {habits.length<5 && (
            <div style={{
              background:t.surface, border:`1px dashed ${t.dashed}`,
              borderRadius:14, padding:18, marginTop:6,
            }}>
              <div style={{ fontSize:12, color:t.textSub, fontWeight:700, marginBottom:14 }}>+ 새 습관</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                {STICKER_OPTIONS.map(s => (
                  <span key={s} onClick={() => setNewHabit({...newHabit,sticker:s})} style={{
                    fontSize:20, cursor:"pointer",
                    opacity: newHabit.sticker===s ? 1 : 0.3,
                    transform: newHabit.sticker===s ? "scale(1.3)" : "scale(1)",
                    transition:"all 0.15s",
                  }}>{s}</span>
                ))}
              </div>
              <input placeholder="습관 이름 (예: 물 2L 마시기)"
                value={newHabit.name}
                onChange={e => setNewHabit({...newHabit,name:e.target.value})}
                style={{ ...inputStyle, marginBottom:12 }} />
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
                {COLOR_OPTIONS.map(c => (
                  <div key={c} onClick={() => setNewHabit({...newHabit,color:c})} style={{
                    width:28, height:28, borderRadius:"50%",
                    background:`radial-gradient(circle at 35% 35%, ${c}, ${c}88)`,
                    cursor:"pointer",
                    border: newHabit.color===c ? "3px solid #888" : "3px solid transparent",
                    boxSizing:"border-box",
                    boxShadow: newHabit.color===c ? `0 0 12px ${c}` : "none",
                    transition:"all 0.15s",
                  }} />
                ))}
              </div>
              <button onClick={() => {
                if (!newHabit.name.trim()) return;
                setHabits([...habits, { id:Date.now(), emoji:"🌟", ...newHabit }]);
                setNewHabit({ name:"", emoji:"🌟", sticker:"⭐", color:"#FFB800" });
              }} style={{
                width:"100%",
                background:"linear-gradient(135deg, #FFB800, #FF6B35)",
                border:"none", color:"#fff", borderRadius:12,
                padding:14, fontSize:14, fontWeight:800, cursor:"pointer",
                boxShadow:"0 4px 20px #FFB80066",
              }}>스티커 추가하기 ✨</button>
            </div>
          )}
        </div>
      )}

      {editHabit && (
        <div style={{
          position:"fixed", inset:0, background:t.overlay, zIndex:300,
          display:"flex", alignItems:"flex-end",
        }} onClick={e => e.target===e.currentTarget && setEditHabit(null)}>
          <div style={{
            background:t.modalBg, borderRadius:"24px 24px 0 0",
            padding:"24px 20px 48px", width:"100%", boxSizing:"border-box",
            border:`1px solid ${t.border}`,
          }}>
            <div style={{ fontSize:15, fontWeight:800, marginBottom:16, color:t.text }}>습관 편집</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14 }}>
              {STICKER_OPTIONS.map(s => (
                <span key={s} onClick={() => setEditHabit({...editHabit,sticker:s})} style={{
                  fontSize:22, cursor:"pointer",
                  opacity: editHabit.sticker===s ? 1 : 0.3,
                  transform: editHabit.sticker===s ? "scale(1.3)" : "scale(1)",
                  transition:"all 0.15s",
                }}>{s}</span>
              ))}
            </div>
            <input value={editHabit.name}
              onChange={e => setEditHabit({...editHabit,name:e.target.value})}
              style={{ ...inputStyle, marginBottom:14 }} />
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:20 }}>
              {COLOR_OPTIONS.map(c => (
                <div key={c} onClick={() => setEditHabit({...editHabit,color:c})} style={{
                  width:28, height:28, borderRadius:"50%",
                  background:`radial-gradient(circle at 35% 35%, ${c}, ${c}88)`,
                  cursor:"pointer",
                  border: editHabit.color===c ? "3px solid #555" : "3px solid transparent",
                  boxSizing:"border-box",
                  boxShadow: editHabit.color===c ? `0 0 12px ${c}` : "none",
                  transition:"all 0.15s",
                }} />
              ))}
            </div>
            <button onClick={() => {
              setHabits(habits.map((h,i) => i===editHabit.idx
                ? {...h, name:editHabit.name, sticker:editHabit.sticker, color:editHabit.color} : h));
              setEditHabit(null);
            }} style={{
              width:"100%",
              background:"linear-gradient(135deg, #FFB800, #FF6B35)",
              border:"none", color:"#fff", borderRadius:12,
              padding:14, fontSize:14, fontWeight:800, cursor:"pointer",
            }}>저장</button>
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<HabitSticker />);
  </script>
</body>
</html>
